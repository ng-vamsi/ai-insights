<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      width: 500px; 
      padding: 15px; 
      font-family: sans-serif; 
    }
    
    h3 { 
      margin: 0 0 15px 0; 
      text-align: center; 
      color: #333;
    }
    
    .api-key-section {
      margin-bottom: 15px;
      padding: 10px;
      background: #fff3cd;
      border-radius: 4px;
      border: 1px solid #ffc107;
    }
    
    .api-key-section.configured {
      background: #d4edda;
      border-color: #28a745;
    }
    
    .api-key-input {
      display: flex;
      gap: 5px;
      margin-top: 5px;
    }
    
    .api-key-input input {
      flex: 1;
      padding: 5px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 12px;
    }
    
    .api-key-input button {
      padding: 5px 10px;
      font-size: 12px;
      flex: none;
    }
    
    .api-key-label {
      font-size: 11px;
      color: #666;
      margin-bottom: 5px;
    }
    
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    
    button { 
      flex: 1;
      padding: 10px; 
      cursor: pointer; 
      border: none; 
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
    }
    
    button:disabled { 
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    #startBtn { 
      background-color: #4285f4; 
      color: white; 
    }
    
    #startBtn:hover:not(:disabled) {
      background-color: #357ae8;
    }
    
    #stopBtn { 
      background-color: #ea4335; 
      color: white; 
    }
    
    #stopBtn:hover:not(:disabled) {
      background-color: #d33828;
    }
    
    #downloadBtn {
      background-color: #34a853;
      color: white;
      width: 100%;
      margin-bottom: 5px;
    }
    
    #downloadBtn:hover:not(:disabled) {
      background-color: #2d8e47;
    }
    
    #playBtn {
      background-color: #fbbc04;
      color: #333;
      width: 100%;
      margin-bottom: 5px;
    }
    
    #playBtn:hover:not(:disabled) {
      background-color: #f9ab00;
    }
    
    .status { 
      margin-top: 10px; 
      padding: 10px;
      font-size: 12px; 
      color: #666; 
      text-align: center;
      background: #f5f5f5;
      border-radius: 4px;
    }
    
    .recording { 
      color: #ea4335; 
      font-weight: bold; 
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .stats {
      margin-top: 10px;
      padding: 10px;
      background: #e8f0fe;
      border-radius: 4px;
      font-size: 11px;
      display: none;
    }
    
    .stats.active {
      display: block;
    }
    
    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    
    .stat-label {
      color: #5f6368;
      font-weight: 500;
    }
    
    .stat-value {
      color: #1a73e8;
      font-weight: 600;
    }
    
    #audioPlayer {
      width: 100%;
      margin-top: 10px;
      display: none;
    }
    
    #audioPlayer.active {
      display: block;
    }
    
    .transcription-section {
      margin-top: 10px;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 4px;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }
    
    .transcription-section.active {
      display: block;
    }
    
    .transcription-title {
      font-size: 12px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    
    .transcript-item {
      font-size: 11px;
      padding: 5px;
      margin-bottom: 5px;
      background: white;
      border-radius: 3px;
      border-left: 3px solid #4285f4;
    }
    
    .transcript-item.interim {
      opacity: 0.6;
      border-left-color: #ccc;
    }
    
    .transcript-time {
      font-size: 10px;
      color: #999;
      margin-right: 5px;
    }
    
    .transcript-text {
      color: #333;
    }
    
    .insights-section {
      margin-top: 10px;
      padding: 10px;
      background: #f0f8ff;
      border-radius: 4px;
      display: none;
      border: 1px solid #4285f4;
    }
    
    .insights-section.active {
      display: block;
    }
    
    .insights-title {
      font-size: 13px;
      font-weight: 600;
      color: #4285f4;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .insight-card {
      background: white;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 3px;
      font-size: 11px;
    }
    
    .insight-label {
      font-weight: 600;
      color: #666;
      margin-bottom: 3px;
    }
    
    .insight-value {
      color: #333;
    }
    
    .sentiment-positive { color: #28a745; }
    .sentiment-neutral { color: #6c757d; }
    .sentiment-negative { color: #dc3545; }
    
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      margin-top: 5px;
    }
    
    .stat-item {
      background: #f8f9fa;
      padding: 5px;
      border-radius: 3px;
      text-align: center;
    }
    
    .stat-number {
      font-size: 16px;
      font-weight: 600;
      color: #4285f4;
    }
    
    .stat-label {
      font-size: 10px;
      color: #666;
    }
    
    .key-phrases {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 5px;
    }
    
    .phrase-tag {
      background: #e7f3ff;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 10px;
      color: #4285f4;
      border: 1px solid #4285f4;
    }
    
    .action-list {
      margin-top: 5px;
    }
    
    .action-item {
      font-size: 10px;
      padding: 4px;
      margin-bottom: 3px;
      background: #fff3cd;
      border-left: 3px solid #ffc107;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <h3>Sales AI Listener</h3>
  
  <div id="apiKeySection" class="api-key-section">
    <div class="api-key-label">Deepgram API Key (Required):</div>
    <div class="api-key-input">
      <input type="password" id="apiKeyInput" placeholder="Enter your Deepgram API key">
      <button id="saveApiKeyBtn">Save</button>
    </div>
    <details style="margin-top: 5px;">
      <summary style="font-size: 10px; color: #666; cursor: pointer;">Optional: OpenAI for deeper insights</summary>
      <div class="api-key-input" style="margin-top: 5px;">
        <input type="password" id="openaiKeyInput" placeholder="OpenAI API key (optional)" style="font-size: 11px;">
        <button id="saveOpenaiKeyBtn" style="font-size: 11px;">Save</button>
      </div>
    </details>
  </div>
  
  <div class="controls">
    <button id="startBtn">Start Recording</button>
    <button id="stopBtn" disabled>Stop Recording</button>
  </div>
  
  <button id="downloadBtn" disabled>Download Recording</button>
  <button id="playBtn" disabled>Play Recording</button>
  
  <div id="status" class="status">Ready to capture...</div>
  
  <div id="stats" class="stats">
    <div class="stat-row">
      <span class="stat-label">Duration:</span>
      <span class="stat-value" id="duration">0s</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Chunks:</span>
      <span class="stat-value" id="chunks">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Size:</span>
      <span class="stat-value" id="size">0 KB</span>
    </div>
  </div>
  
  <audio id="audioPlayer" controls></audio>
  
  <div id="transcriptionSection" class="transcription-section">
    <div class="transcription-title">Live Transcription:</div>
    <div id="transcriptContainer"></div>
  </div>
  
  <div id="insightsSection" class="insights-section">
    <div class="insights-title">
      AI Insights
      <button id="generateAISummaryBtn" style="margin-left: auto; padding: 3px 8px; font-size: 10px; background: #4285f4; color: white; border: none; border-radius: 3px; cursor: pointer;">
        Deep Analysis
      </button>
    </div>
    <div id="insightsContainer"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
